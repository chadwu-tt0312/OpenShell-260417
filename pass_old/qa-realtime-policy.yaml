version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /var/log
  read_write:
    - /sandbox
    - /tmp
    - /dev/null

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  opencode:
    name: opencode
    endpoints:
      # Keep provider/runtime endpoints required by opencode.
      - host: registry.npmjs.org
        port: 443
      - host: opencode.ai
        port: 443
      - host: integrate.api.nvidia.com
        port: 443
      # Realtime market/FX endpoints (read-only REST over HTTPS).
      - host: www.twse.com.tw
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        access: read-only
      - host: api.exchangerate.host
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        access: read-only
      # Exa web search endpoint used by opencode search tooling.
      - host: api.exa.ai
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        access: read-only
      - host: mcp.exa.ai
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        rules:
          - allow:
              method: POST
              path: /mcp
          - allow:
              method: GET
              path: /**
      - host: exa.ai
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        access: read-only
      - host: rate.bot.com.tw
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        access: read-only
    binaries:
      - path: /usr/lib/node_modules/opencode-ai/bin/.opencode
      - path: /usr/bin/node
      - path: /usr/local/bin/opencode
      - path: /usr/bin/curl
